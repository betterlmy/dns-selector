name: Create Release and Build Binaries

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag to release, for example v1.0.0"
        required: true
        type: string

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  test:
    name: Format Check and Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref }}

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: "go.mod"
          cache: true

      - name: Check formatting
        run: test -z "$(gofmt -l .)"

      - name: Run tests
        run: go test ./...

      - name: Run go vet
        run: go vet ./...

  build:
    name: Build for ${{ matrix.os }}/${{ matrix.arch }}
    runs-on: ubuntu-latest
    needs: test
    strategy:
      matrix:
        os: ["linux", "windows", "darwin"]
        arch: ["amd64", "arm64"]

    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref }}

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: "go.mod"
          cache: true

      - name: Build and Package
        id: build-and-package
        env:
          GOOS: ${{ matrix.os }}
          GOARCH: ${{ matrix.arch }}
          PROJECT_NAME: ${{ github.event.repository.name }}
        run: |
          TAG=${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref_name }}
          BINARY_BASE_NAME="${PROJECT_NAME}-${TAG}-${GOOS}-${GOARCH}"
          BINARY_FINAL_NAME="${BINARY_BASE_NAME}"

          if [ "${GOOS}" = "windows" ]; then
            BINARY_FINAL_NAME+=".exe"
            ARCHIVE_NAME="${BINARY_BASE_NAME}.zip"
          else
            ARCHIVE_NAME="${BINARY_BASE_NAME}.tar.gz"
          fi

          go build -ldflags="-s -w" -o "${BINARY_FINAL_NAME}" .

          if [ "${GOOS}" = "windows" ]; then
            7z a "${ARCHIVE_NAME}" "${BINARY_FINAL_NAME}"
          else
            tar -czvf "${ARCHIVE_NAME}" "${BINARY_FINAL_NAME}"
          fi

          echo "asset_path=${ARCHIVE_NAME}" >> $GITHUB_OUTPUT

      - name: Upload Artifact
        uses: actions/upload-artifact@v6
        with:
          name: release-asset-${{ matrix.os }}-${{ matrix.arch }}
          path: ${{ steps.build-and-package.outputs.asset_path }}
          retention-days: 1

  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download all release assets
        uses: actions/download-artifact@v6
        with:
          path: release-assets/

      - name: Generate checksums
        run: |
          cd release-assets
          find . -type f | sort | xargs sha256sum > ../checksums.txt
          mv ../checksums.txt checksums.txt

      - name: Create Release and Upload Assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref_name }}
          generate_release_notes: true
          files: |
            release-assets/**/*
